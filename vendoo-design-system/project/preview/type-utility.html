<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<style>
  html,body{margin:0;padding:0;background:#fff;}
  .card{width:760px;padding:22px 24px;box-sizing:border-box;}
  .row{display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid var(--sys-outline-variant);}
  .row:last-child{border-bottom:none;}
  .meta{font:500 11px/14px var(--font-sans);letter-spacing:.6px;color:var(--sys-on-surface-variant);text-transform:uppercase;width:130px;flex:none;}
  .spec{font:400 11px/14px ui-monospace,Menlo,monospace;color:var(--sys-on-surface-variant);margin-left:auto;flex:none;}
  .sample{color:var(--sys-on-surface);}
  h2{font:500 12px/16px var(--font-sans);color:var(--sys-on-surface-variant);letter-spacing:.5px;text-transform:uppercase;margin:0 0 6px;}
  p{margin:0 0 14px;font:400 12px/18px var(--font-sans);color:var(--sys-on-surface-variant);}
</style></head>
<body><div class="card">

  <h2>Utility</h2>
  <p>Reserved for non-content UI text — section dividers, counters, helper meta.</p>
  <div class="row"><span class="meta">medium-caps</span><span class="sample utility-medium-caps">section heading</span><span class="spec">12/16 · 400 · UC · +.20</span></div>
  <div class="row"><span class="meta">small-compact</span><span class="sample utility-small-compact">0 / 100 characters used</span><span class="spec">11/14 · 400 · 0</span></div>

</div></body></html>
