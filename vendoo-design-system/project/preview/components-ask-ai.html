<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);}
  .card{width:700px;padding:22px 24px;box-sizing:border-box;display:flex;flex-direction:column;gap:18px;}

  .label{font:500 11px/14px var(--font-sans);letter-spacing:.6px;text-transform:uppercase;color:var(--sys-on-surface-variant);}

  /* Open variant — active input row */
  .bar{
    background: var(--sys-primary-container);
    border: 1px solid var(--sys-outline-variant);
    border-radius: var(--shape-corner-sm);
    padding: 10px 10px 10px 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .bar input{
    flex:1;
    border:none;background:transparent;outline:none;
    font: var(--type-body-md);
    letter-spacing: var(--track-body-md);
    color: var(--sys-on-primary-container);
  }
  .bar input::placeholder{ color: var(--sys-on-surface-variant); font-weight: 400; }
  .send{
    width:36px;height:36px;border-radius:999px;
    background: var(--sys-primary);
    display:flex;align-items:center;justify-content:center;
    color: var(--sys-on-primary);
    cursor:pointer;flex:none;border:none;
  }
  .send svg{ width:18px;height:18px; }

  /* Collapsed variant — chip */
  .chip{
    align-self:flex-start;
    display:inline-flex;align-items:center;gap:8px;
    padding:10px 16px;border-radius:999px;
    background: var(--sys-primary-container);
    color: var(--sys-on-primary-container);
    font: var(--type-label-lg);
    letter-spacing: var(--track-label-lg);
    cursor:pointer;border:none;
  }
  .chip svg{ width:18px;height:18px;color: var(--sys-primary); }
</style></head>
<body><div class="card">

  <div class="label">Collapsed · chip trigger</div>
  <button class="chip">
    <svg viewBox="0 0 24 24"><use href="../assets/icons.svg#sparkle"/></svg>
    Ask AI
  </button>

  <div class="label">Open · active input</div>
  <div class="bar">
    <input placeholder="Ask AI — e.g. 'Write titles for a vintage sweater'" value="" />
    <button class="send" aria-label="Send">
      <svg viewBox="0 0 24 24"><use href="../assets/icons.svg#arrow_up"/></svg>
    </button>
  </div>

  <div class="label">Open · with typed query</div>
  <div class="bar">
    <input value="Write titles for a vintage Levi's denim jacket, size M" />
    <button class="send" aria-label="Send">
      <svg viewBox="0 0 24 24"><use href="../assets/icons.svg#arrow_up"/></svg>
    </button>
  </div>

</div></body></html>
