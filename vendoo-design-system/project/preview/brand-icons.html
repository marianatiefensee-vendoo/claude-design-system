<!doctype html>
<html><head><meta charset="utf-8">
<title>Icons · Vendoo DS</title>
<link rel="stylesheet" href="../tokens.css">
<style>
  html,body{margin:0;padding:0;background:#fff;font-family:var(--font-sans);color:var(--sys-on-surface);}
  .card{width:700px;padding:20px 24px;box-sizing:border-box;}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px 8px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:8px;}
  .cell:hover{background:var(--sys-surface-container-low);}
  .cell svg{width:24px;height:24px;color:var(--sys-on-surface);}
  .cell span{font:400 9px/12px var(--font-sans);letter-spacing:.2px;text-align:center;color:var(--sys-on-surface-variant);word-break:break-all;}
  .head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px;}
  .head h3{font:500 14px/20px var(--font-sans);margin:0;}
  .head small{font:400 11px/14px var(--font-sans);color:var(--sys-on-surface-variant);letter-spacing:.3px;}
  .swatch-row{display:flex;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid var(--sys-outline-variant);align-items:center;}
  .swatch-row svg{width:20px;height:20px;}
  .swatch-row .lbl{font:400 11px/14px var(--font-sans);color:var(--sys-on-surface-variant);margin-right:8px;letter-spacing:.3px;}
</style></head>
<body>
<div class="card">
  <div class="head">
    <h3>Go Flow icons · <span id="count">—</span></h3>
    <small>24×24 · single weight · two-tone via <code>currentColor</code></small>
  </div>
  <div class="grid" id="grid"></div>
  <div class="swatch-row">
    <span class="lbl">color inheritance</span>
    <svg style="color:var(--sys-on-surface)"><use href="../assets/icons.svg#sparkle"/></svg>
    <svg style="color:var(--sys-primary)"><use href="../assets/icons.svg#sparkle"/></svg>
    <svg style="color:var(--sys-error)"><use href="../assets/icons.svg#sparkle"/></svg>
    <svg style="color:var(--sys-on-surface-variant)"><use href="../assets/icons.svg#sparkle"/></svg>
    <svg style="color:#47CDAE"><use href="../assets/icons.svg#sparkle"/></svg>
  </div>
</div>
<script src="../assets/icons-manifest.js"></script>
<script>
  const names = window.VENDOO_ICON_NAMES || [];
  const grid = document.getElementById('grid');
  document.getElementById('count').textContent = names.length;
  grid.innerHTML = names
    .map(n => `<div class="cell" title="${n}"><svg viewBox="0 0 24 24" aria-hidden="true"><use href="../assets/icons.svg#${n}"/></svg><span>${n}</span></div>`)
    .join('');
</script>
</body></html>
