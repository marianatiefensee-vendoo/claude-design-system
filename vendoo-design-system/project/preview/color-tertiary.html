<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<link rel="stylesheet" href="role-cards.css">
</head><body>
<div class="card">
  <h2>Tertiary · accent</h2>
  <p class="desc">Contrasting accents that balance primary and secondary, or bring attention to special elements — input field focus, badges, tagging.</p>

  <div class="roles">
    <div class="role" style="background:var(--sys-tertiary);color:var(--sys-on-tertiary);"><span class="name">tertiary</span><span class="hex">#790070</span></div>
    <div class="role" style="background:var(--sys-on-tertiary);color:var(--sys-tertiary);"><span class="name">on-tertiary</span><span class="hex">#FFFFFF</span></div>
    <div class="role" style="background:var(--sys-tertiary-container);color:var(--sys-on-tertiary-container);"><span class="name">tertiary-container</span><span class="hex">#9D1791</span></div>
    <div class="role" style="background:var(--sys-on-tertiary-container);color:var(--sys-tertiary-container);"><span class="name">on-tertiary-container</span><span class="hex">#FFBAED</span></div>
  </div>

  <div class="uses">
    <div class="use" style="background:var(--sys-tertiary-container);color:var(--sys-on-tertiary-container);"><span class="tag">Badge</span>AI suggested</div>
    <div class="use" style="background:var(--sys-tertiary);color:var(--sys-on-tertiary);"><span class="tag">Focus accent</span>Price check</div>
  </div>
</div>
</body></html>
