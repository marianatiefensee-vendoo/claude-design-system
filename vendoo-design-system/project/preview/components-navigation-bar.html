<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Navigation Bar — component preview</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root { color-scheme: light; }
  html, body {
    margin: 0; padding: 0;
    background: var(--sys-surface);
    font-family: var(--font-sans);
    color: var(--sys-on-surface);
  }
  .page {
    width: 520px;
    padding: 32px 24px 48px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    gap: 32px;
  }
  .page-title {
    font: 600 22px/28px var(--font-sans);
    color: var(--sys-on-surface);
    margin: 0;
  }
  .group {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .group-label {
    font: 500 11px/14px var(--font-sans);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--sys-on-surface-variant);
    margin: 0;
  }
  .specs {
    display: grid;
    grid-template-columns: max-content 1fr;
    column-gap: 16px;
    row-gap: 4px;
    font-size: 11px;
    line-height: 16px;
    color: var(--sys-on-surface-variant);
    padding: 12px 14px;
    background: var(--sys-surface-container-low);
    border-radius: 8px;
    margin-top: 8px;
  }
  .specs dt { color: var(--sys-on-surface); font-weight: 500; }
  .specs code { font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 10.5px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="../../ui_kits/vendoo-app/Icon.jsx"></script>
<script type="text/babel" src="../../ui_kits/vendoo-app/NavigationBar.jsx"></script>

<script type="text/babel">
const NAV_ITEMS = [
  { id: "listings", icon: "listing_alt", label: "Listings" },
  { id: "store",    icon: "store",       label: "Store"    },
  { id: "sales",    icon: "shopping_bag",label: "Sales"    },
  { id: "insights", icon: "Analytics",   label: "Insights" },
];

function Demo() {
  const [active1, setActive1] = React.useState("listings");
  const [active2, setActive2] = React.useState("sales");

  return (
    <div className="page">
      <h1 className="page-title">Navigation Bar</h1>

      <div className="group">
        <p className="group-label">First item active (Listings)</p>
        <NavigationBar
          items={NAV_ITEMS}
          activeItem={active1}
          onItemChange={setActive1}
          onFabPress={() => alert("FAB pressed")}
        />
      </div>

      <div className="group">
        <p className="group-label">Third item active (Sales)</p>
        <NavigationBar
          items={NAV_ITEMS}
          activeItem={active2}
          onItemChange={setActive2}
          onFabPress={() => alert("FAB pressed")}
        />
      </div>

      <dl className="specs">
        <dt>Container</dt><dd><code>412 × 64</code> · <code>--sys-surface-container</code></dd>
        <dt>Nav item</dt><dd><code>89 × 64</code> at x = 0 / 89 / 234 / 323</dd>
        <dt>Active pill</dt><dd>radius <code>5px</code> · fill <code>#ffffff</code></dd>
        <dt>Inactive pill</dt><dd>radius <code>16px</code> · transparent</dd>
        <dt>Icon</dt><dd><code>24 × 24</code> · <code>--sys-on-surface</code> (always)</dd>
        <dt>Label</dt><dd>Lexend 500 / 12px / 16px / 0.5px · <code>--sys-on-surface-variant</code> (always)</dd>
        <dt>FAB</dt><dd><code>56 × 56</code> at x:178 y:4 · radius <code>8px</code> · <code>--sys-primary</code></dd>
        <dt>FAB icon</dt><dd><code>plus_circle 24px</code> · <code>--sys-on-primary</code></dd>
        <dt>Figma node</dt><dd><code>555:30780</code></dd>
      </dl>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Demo />);
</script>
</body>
</html>
