<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<style>
  html,body{margin:0;padding:0;background:var(--sys-surface);font-family:var(--font-sans);color:var(--sys-on-surface);}
  .card{width:700px;padding:22px 24px;box-sizing:border-box;}
  .row{display:flex;align-items:baseline;gap:16px;padding:8px 0;border-bottom:1px solid var(--sys-outline-variant);}
  .row:last-child{border-bottom:none;}
  .meta{font:500 11px/14px var(--font-sans);letter-spacing:.6px;color:var(--sys-on-surface-variant);text-transform:uppercase;width:110px;flex:none;}
  .spec{font:400 11px/14px ui-monospace,Menlo,monospace;color:var(--sys-on-surface-variant);margin-left:auto;flex:none;}
  .sample{color:var(--sys-on-surface);}
</style></head>
<body><div class="card">
  <div class="row"><span class="meta">Headline lg</span><span class="sample" style="font:400 32px/40px var(--font-sans);">Create a listing</span><span class="spec">32/40 · 400</span></div>
  <div class="row"><span class="meta">Headline md</span><span class="sample" style="font:400 28px/36px var(--font-sans);">Crosslist to 4</span><span class="spec">28/36 · 400</span></div>
  <div class="row"><span class="meta">Headline sm</span><span class="sample" style="font:400 24px/32px var(--font-sans);">AI suggested title</span><span class="spec">24/32 · 400</span></div>
</div></body></html>
