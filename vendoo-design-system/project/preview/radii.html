<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<style>
  html,body{margin:0;padding:0;background:var(--sys-surface);color:var(--sys-on-surface);font-family:var(--font-sans);}
  .card{width:700px;padding:22px 24px;box-sizing:border-box;display:flex;gap:14px;flex-wrap:wrap;}
  .cell{width:calc((100% - 42px)/4);display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:80px;height:80px;background:var(--sys-primary-container);border:1px solid var(--sys-primary);}
  .lbl{font:500 11px/14px var(--font-sans);letter-spacing:.6px;color:var(--sys-on-surface-variant);text-transform:uppercase;}
  .px{font:400 12px/16px ui-monospace,Menlo,monospace;color:var(--sys-on-surface);}
</style></head>
<body><div class="card">
  <div class="cell"><div class="box" style="border-radius:4px;"></div><span class="lbl">xs</span><span class="px">4px · field, button</span></div>
  <div class="cell"><div class="box" style="border-radius:8px;"></div><span class="lbl">sm</span><span class="px">8px · photo tile</span></div>
  <div class="cell"><div class="box" style="border-radius:12px;"></div><span class="lbl">md</span><span class="px">12px · card</span></div>
  <div class="cell"><div class="box" style="border-radius:28px;"></div><span class="lbl">xl</span><span class="px">28px · sheet</span></div>
</div></body></html>
