<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../tokens.css">
<style>
  html,body{margin:0;padding:0;background:var(--sys-surface);color:var(--sys-on-surface);font-family:var(--font-sans);}
  .card{width:700px;padding:22px 24px;box-sizing:border-box;}
  .row{display:flex;align-items:center;gap:14px;margin-bottom:10px;}
  .lbl{font:500 11px/14px var(--font-sans);letter-spacing:.6px;color:var(--sys-on-surface-variant);text-transform:uppercase;width:56px;flex:none;}
  .bar{background:var(--sys-primary);height:12px;border-radius:2px;}
  .px{font:400 12px/16px ui-monospace,Menlo,monospace;color:var(--sys-on-surface-variant);width:40px;flex:none;text-align:right;}
</style></head>
<body><div class="card">
  <div class="row"><span class="lbl">2</span><div class="bar" style="width:2px;"></div><span class="px">2</span></div>
  <div class="row"><span class="lbl">4</span><div class="bar" style="width:4px;"></div><span class="px">4</span></div>
  <div class="row"><span class="lbl">8</span><div class="bar" style="width:8px;"></div><span class="px">8</span></div>
  <div class="row"><span class="lbl">12</span><div class="bar" style="width:12px;"></div><span class="px">12</span></div>
  <div class="row"><span class="lbl">16</span><div class="bar" style="width:16px;"></div><span class="px">16</span></div>
  <div class="row"><span class="lbl">24</span><div class="bar" style="width:24px;"></div><span class="px">24</span></div>
  <div class="row"><span class="lbl">32</span><div class="bar" style="width:32px;"></div><span class="px">32</span></div>
  <div class="row"><span class="lbl">48</span><div class="bar" style="width:48px;"></div><span class="px">48</span></div>
  <div class="row"><span class="lbl">64</span><div class="bar" style="width:64px;"></div><span class="px">64</span></div>
</div></body></html>
