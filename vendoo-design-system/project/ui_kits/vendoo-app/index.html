<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<base href="/ui_kits/vendoo-app/">
<title>Vendoo — UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html, body { margin: 0; padding: 0; background: #F2EBF9; min-height: 100vh; }
  body {
    font-family: var(--font-sans);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    box-sizing: border-box;
  }
  .stage { display: flex; gap: 32px; align-items: flex-start; }
  .meta {
    width: 280px; padding-top: 16px;
    color: var(--sys-on-surface);
  }
  .meta h1 {
    font: 600 28px/36px var(--font-sans);
    color: var(--sys-on-surface);
    margin: 0 0 8px;
  }
  .meta p {
    font: 400 14px/20px var(--font-sans); letter-spacing: 0.25px;
    color: var(--sys-on-surface-variant);
    margin: 0 0 16px;
  }
  .meta .kbd {
    display: inline-block; padding: 2px 8px;
    background: var(--sys-surface-container-high);
    border: 1px solid var(--sys-outline-variant);
    border-radius: 4px;
    font: 500 11px/16px ui-monospace,Menlo,monospace;
    color: var(--sys-on-surface);
  }
  @media (max-width: 900px) { .stage { flex-direction: column; } .meta { width: 100%; } }
</style>
</head>
<body>
  <div class="stage">
    <div class="meta">
      <h1>Vendoo</h1>
      <p>Cross-marketplace listing manager. List once, crosspost to Poshmark, eBay, Mercari and more.</p>
      <p style="margin-top:12px;">
        Tap the <span class="kbd">+</span> FAB to start a listing, tap a listing to re-open it, or switch tabs in the bottom nav. Everything's clickable.
      </p>
      <div id="dialog-demo-root" style="margin-top:24px;"></div>
    </div>
    <div id="root"></div>
  </div>

<script src="../../assets/icons-manifest.js"></script>
<script type="text/babel" src="./Icon.jsx"></script>
<script type="text/babel" src="./Dialog.jsx"></script>
<script type="text/babel" src="./Button.jsx"></script>
<script type="text/babel" src="./IconButton.jsx"></script>
<script type="text/babel" src="./Fields.jsx"></script>
<script type="text/babel" src="./Field.jsx"></script>
<script type="text/babel" src="./ListingSectionCard.jsx"></script>
<script type="text/babel" src="./AppShell.jsx"></script>
<script src="./data.js?v=3"></script>
<script type="text/babel" src="./Inventory.jsx"></script>
<script type="text/babel" src="./CreateListing.jsx"></script>
<script type="text/babel" src="./CameraScreen.jsx"></script>
<script type="text/babel" src="./ListingFormScreen.jsx"></script>

<script type="text/babel">

// ── Lazy-create draft shape ────────────────────────────────────────────────────
const EMPTY_DRAFT = {
  photos: [],
  generalDetails: {
    category: '', condition: '', brand: '', model: '', color: '', size: '',
  },
  pricing: { price: '' },
};

// ── FlowShell — wizard frame for the lazy-create flow ─────────────────────────
function FlowShell({ step, totalSteps, stepLabel, onBack, onClose, footer, children }) {
  const progress = step / totalSteps;
  return (
    <div style={{
      position: "relative",
      width: 420, height: 820,
      borderRadius: 28,
      overflow: "hidden",
      background: "var(--sys-background)",
      boxShadow: "var(--elev-3)",
      display: "flex", flexDirection: "column",
      fontFamily: "var(--font-sans)",
      border: "1px solid var(--sys-outline-variant)",
    }}>
      {/* Top bar */}
      <div style={{
        height: 56, flex: "none", padding: "0 8px",
        display: "flex", alignItems: "center", gap: 4,
        background: "var(--sys-surface)",
        borderBottom: "1px solid var(--sys-outline-variant)",
      }}>
        <IconButton icon="arrow_left" title="Back" onClick={onBack} />
        <div style={{
          flex: 1, textAlign: "center",
          font: "500 16px/24px var(--font-sans)", letterSpacing: "0.15px",
          color: "var(--sys-on-surface)",
        }}>{stepLabel}</div>
        <IconButton icon="x" title="Discard and close" onClick={onClose} />
      </div>

      {/* Progress bar */}
      <div style={{ height: 3, flex: "none", background: "var(--sys-surface-container-high)" }}>
        <div style={{
          height: "100%",
          width: (progress * 100) + "%",
          background: "var(--sys-primary)",
          transition: "width 300ms ease",
        }} />
      </div>

      {/* Scrollable body */}
      <div style={{ flex: 1, overflowY: "auto", position: "relative" }}>
        {children}
      </div>

      {/* Sticky footer */}
      {footer && (
        <div style={{
          flex: "none", padding: "12px 16px",
          borderTop: "1px solid var(--sys-outline-variant)",
          background: "var(--sys-surface)",
          display: "flex", alignItems: "center", gap: 12,
        }}>
          {footer}
        </div>
      )}
    </div>
  );
}

// ── Pricing placeholder (stub for Phase 4+) ───────────────────────────────────
function PricingPlaceholder({ draft }) {
  return (
    <div style={{ padding: "20px 16px 40px", display: "flex", flexDirection: "column", gap: 20 }}>
      <div>
        <h2 style={{
          fontFamily: "var(--font-sans)", fontSize: 20, fontWeight: 500,
          lineHeight: "28px", color: "var(--sys-on-surface)", margin: "0 0 4px",
        }}>Set your price</h2>
        <p style={{
          fontFamily: "var(--font-sans)", fontSize: 14,
          lineHeight: "20px", letterSpacing: "0.25px",
          color: "var(--sys-on-surface-variant)", margin: 0,
        }}>We'll recommend a price once our AI finishes analyzing your item.</p>
      </div>
      <div style={{
        display: "flex", gap: 10, alignItems: "center",
        padding: "14px 16px",
        background: "var(--sys-surface-container)",
        borderRadius: 12,
      }}>
        <Icon name="sparkle" size={20} color="var(--sys-primary)" />
        <span style={{
          fontFamily: "var(--font-sans)", fontSize: 13, fontWeight: 400,
          lineHeight: "18px", letterSpacing: "0.25px",
          color: "var(--sys-on-surface-variant)",
        }}>
          AI pricing analysis running in background…
        </span>
      </div>
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────────
const FLOW_STEPS  = ['camera', 'form', 'pricing'];
const STEP_LABELS = { camera: 'Add photos', form: 'Item details', pricing: 'Set your price' };

function App() {
  const [view, setView] = React.useState("inventory"); // inventory | home | messages | profile | lazyCreate
  const [editing, setEditing] = React.useState(null);

  // ── Lazy-create state ──
  const [flowStep, setFlowStep]   = React.useState('camera');
  const [draft, setDraft]         = React.useState(EMPTY_DRAFT);
  const phase4Ref                 = React.useRef(null);
  const [draftMarkets, setDraftMarkets] = React.useState(["poshmark", "ebay", "mercari"]);

  const updateDraft = (patch) => setDraft(d => ({ ...d, ...patch }));
  const updateGeneralDetails = (patch) => setDraft(d => ({
    ...d, generalDetails: { ...d.generalDetails, ...patch },
  }));

  const openLazyCreate = () => {
    setDraft(EMPTY_DRAFT);
    setFlowStep('camera');
    setView('lazyCreate');
  };

  const flowStepIndex = FLOW_STEPS.indexOf(flowStep) + 1;
  const isLastStep    = flowStepIndex === FLOW_STEPS.length;

  const goNextStep = () => {
    if (flowStep === 'form') {
      // Fire Phase 4 compute-presentation in background; don't await it
      if (phase4Ref.current) clearTimeout(phase4Ref.current);
      phase4Ref.current = setTimeout(() => {
        console.log('[Phase 4] compute-presentation complete');
      }, 2000);
    }
    const nextIdx = FLOW_STEPS.indexOf(flowStep) + 1;
    if (nextIdx < FLOW_STEPS.length) setFlowStep(FLOW_STEPS[nextIdx]);
    else setView('inventory');
  };

  const goBackStep = () => {
    const prevIdx = FLOW_STEPS.indexOf(flowStep) - 1;
    if (prevIdx < 0) setView('inventory');
    else setFlowStep(FLOW_STEPS[prevIdx]);
  };

  // ── Lazy-create view ──
  if (view === 'lazyCreate') {
    return (
      <FlowShell
        step={flowStepIndex}
        totalSteps={FLOW_STEPS.length}
        stepLabel={STEP_LABELS[flowStep]}
        onBack={goBackStep}
        onClose={() => setView('inventory')}
        footer={
          <React.Fragment>
            <Button variant="text" onClick={() => setView('inventory')}>Save draft</Button>
            <Button
              variant="filled"
              style={{ marginLeft: "auto" }}
              disabled={flowStep === 'camera' && draft.photos.length === 0}
              onClick={goNextStep}
            >
              {isLastStep ? 'Publish' : 'Next'}
            </Button>
          </React.Fragment>
        }
      >
        {flowStep === 'camera' && (
          <CameraScreen
            photos={draft.photos}
            onUpdatePhotos={(photos) => updateDraft({ photos })}
          />
        )}
        {flowStep === 'form' && (
          <ListingFormScreen
            draft={draft}
            onUpdateGeneralDetails={updateGeneralDetails}
          />
        )}
        {flowStep === 'pricing' && (
          <PricingPlaceholder draft={draft} />
        )}
      </FlowShell>
    );
  }

  // ── Inventory / other views ──
  const titles = {
    home: "Home", inventory: "Inventory",
    create: editing ? "Edit listing" : "Create listing",
    messages: "Messages", profile: "Profile",
  };

  const openCreate  = () => { setEditing(null); setView("create"); };
  const openListing = (l) => { setEditing(l);   setView("create"); };

  const trailing = view === "inventory" ? (
    <IconButton icon="filter" title="Filter" />
  ) : view === "create" ? (
    <IconButton icon="x" title="Close" onClick={() => { setEditing(null); setView("inventory"); }} />
  ) : null;

  const footer = view === "create" ? (
    <React.Fragment>
      <Button variant="text" onClick={() => setView("inventory")}>Save draft</Button>
      <Button variant="filled" style={{ marginLeft: "auto" }} disabled={draftMarkets.length === 0}>
        Crosslist to {draftMarkets.length}
      </Button>
    </React.Fragment>
  ) : null;

  let content;
  switch (view) {
    case "inventory":
      content = <Inventory onOpen={openListing} onCreate={openCreate} />; break;
    case "create":
      content = <CreateListing markets={draftMarkets} setMarkets={setDraftMarkets} />; break;
    case "home":
      content = <Placeholder title="Home" body="Your dashboard will show sales, views and suggested actions here." />; break;
    case "messages":
      content = <Placeholder title="Messages" body="No new messages across your marketplaces." />; break;
    case "profile":
      content = <Placeholder title="Profile" body="Account, connected marketplaces, and plan settings." />; break;
    default:
      content = null;
  }

  return (
    <AppShell
      view={view} setView={setView}
      title={titles[view]} trailing={trailing}
      stickyFooter={footer}
      onFabPress={openLazyCreate}
    >
      {content}
    </AppShell>
  );
}

function Placeholder({ title, body }) {
  return (
    <div style={{
      padding: "40px 24px",
      display: "flex", flexDirection: "column", gap: 12,
      alignItems: "flex-start",
    }}>
      <h2 style={{ font: "400 24px/32px var(--font-sans)", color: "var(--sys-on-surface)", margin: 0 }}>{title}</h2>
      <p style={{
        font: "400 14px/20px var(--font-sans)", letterSpacing: "0.25px",
        color: "var(--sys-on-surface-variant)", margin: 0,
      }}>{body}</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

// ── Dialog demo (sidebar) ─────────────────────────────────────────────────────
function DialogDemo() {
  const [open, setOpen] = React.useState(false);
  const [loading, setLoading] = React.useState(false);

  const handlePrimary = () => {
    setLoading(true);
    setTimeout(() => { setLoading(false); setOpen(false); }, 1500);
  };

  return (
    <React.Fragment>
      <Button variant="tonal" onClick={() => setOpen(true)}>
        Show dialog
      </Button>
      <Dialog
        open={open}
        onClose={() => setOpen(false)}
        title="Publish listing?"
        primaryAction={{ label: "Publish", onClick: handlePrimary, loading }}
        secondaryAction={{ label: "Cancel", onClick: () => setOpen(false) }}
      >
        This listing will be crossposted to your connected marketplaces. You can unpublish it at any time from your inventory.
      </Dialog>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("dialog-demo-root")).render(<DialogDemo />);
</script>
</body>
</html>
