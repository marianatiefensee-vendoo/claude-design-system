<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<base href="/ui_kits/vendoo-app/">
<title>Vendoo — UI kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<!-- Lexend Deca — used for button labels in the Go Flow screens -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@400;500;600&display=swap">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  /* ── Prototype stage layout ─────────────────────────────────────────── */
  html, body { margin: 0; padding: 0; background: #F2EBF9; min-height: 100vh; }
  body {
    font-family: var(--font-sans);
    display: flex; align-items: center; justify-content: center;
    padding: 40px 20px;
    box-sizing: border-box;
  }
  .stage { display: flex; gap: 32px; align-items: flex-start; }
  .meta {
    width: 280px; padding-top: 16px;
    color: var(--sys-on-surface);
  }
  .meta h1 {
    font: 600 28px/36px var(--font-sans);
    color: var(--sys-on-surface);
    margin: 0 0 8px;
  }
  .meta p {
    font: 400 14px/20px var(--font-sans); letter-spacing: 0.25px;
    color: var(--sys-on-surface-variant);
    margin: 0 0 16px;
  }
  .meta .kbd {
    display: inline-block; padding: 2px 8px;
    background: var(--sys-surface-container-high);
    border: 1px solid var(--sys-outline-variant);
    border-radius: 4px;
    font: 500 11px/16px ui-monospace,Menlo,monospace;
    color: var(--sys-on-surface);
  }
  @media (max-width: 900px) { .stage { flex-direction: column; } .meta { width: 100%; } }

  /* ── Go Flow design tokens ──────────────────────────────────────────── */
  :root {
    --go-bg-camera:  #141A21;   /* Camera screen background          */
    --go-neutral:    #EEEEEE;   /* Borders, dashed outlines          */
    --go-neutral-2:  #240643;   /* Section / page headings           */
    --go-secondary:  #653CC9;   /* Primary CTA, switches, accents    */
    --go-gray-50:    #F7F7F7;   /* Form item card background         */
    --go-gray-800:   #474747;   /* Secondary / body text             */
    --go-tonal-100:  #E9E3F7;   /* Light purple tint (icon btn bg)   */
    --go-indigo-950: #230F38;   /* Dark body text                    */
    --go-success:    #71D831;   /* "Connected" marketplace badge     */
    --go-purple-700: #432197;   /* Success screen heading            */
  }

  /* ── Go Flow animations ─────────────────────────────────────────────── */
  @keyframes go-spin    { to { transform: rotate(360deg); } }
  @keyframes go-shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position:  200% 0; }
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="meta">
      <h1>Vendoo</h1>
      <p>Cross-marketplace listing manager. List once, crosspost to Poshmark, eBay, Mercari and more.</p>
      <p style="margin-top:12px;">
        Tap the <span class="kbd">+</span> FAB to start a listing, tap a listing to re-open it, or switch tabs in the bottom nav. Everything's clickable.
      </p>
      <div id="dialog-demo-root" style="margin-top:24px;"></div>
    </div>
    <div id="root"></div>
  </div>

<script src="../../assets/icons-manifest.js"></script>
<script type="text/babel" src="./Icon.jsx"></script>
<script type="text/babel" src="./Dialog.jsx"></script>
<script type="text/babel" src="./Button.jsx"></script>
<script type="text/babel" src="./IconButton.jsx"></script>
<script type="text/babel" src="./SelectionControl.jsx"></script>
<script type="text/babel" src="./Fields.jsx"></script>
<script type="text/babel" src="./Field.jsx"></script>
<script type="text/babel" src="./ListingSectionCard.jsx"></script>
<script type="text/babel" src="./AppShell.jsx"></script>
<script src="./data.js?v=3"></script>
<script type="text/babel" src="./Inventory.jsx"></script>
<script type="text/babel" src="./CreateListing.jsx"></script>
<!-- Pass 2: lazy listing flow screens -->
<script type="text/babel" src="./CameraScreen.jsx"></script>

<script type="text/babel">

// ─────────────────────────────────────────────────────────────────────────────
// FlowShell — minimal phone frame for the linear listing flow screens.
// These screens manage their own top nav / back / close buttons, so this
// wrapper only provides the 420×820 device chrome (no app bar, no bottom nav).
// ─────────────────────────────────────────────────────────────────────────────
function FlowShell({ children }) {
  return (
    <div style={{
      position: 'relative',
      width: 420, height: 820,
      borderRadius: 28,
      overflow: 'hidden',
      boxShadow: 'var(--elev-3)',
      display: 'flex', flexDirection: 'column',
      fontFamily: 'var(--font-sans)',
      border: '1px solid var(--sys-outline-variant)',
    }}>
      {children}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// Listing draft — initial state (zero Firestore until Phase 7)
// ─────────────────────────────────────────────────────────────────────────────
const EMPTY_DRAFT = {
  images:               [],     // CapturedImageStateType[]
  enrichments:          null,   // AIEnrichmentsType | null
  generalDetails:       {},     // Partial<GeneralDetailsType>
  analyzingStatus:      'idle', // 'idle' | 'analyzing' | 'ready'
  presentationStatus:   'idle', // 'idle' | 'generating' | 'ready'
  selectedMarketplaces: [],     // Marketplace[]
  itemId:               null,   // string | null — only set in Phase 7
};

// ─────────────────────────────────────────────────────────────────────────────
// App — root router
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  // ── Navigation ──────────────────────────────────────────────────────────
  // Inventory-side views:   inventory | home | messages | profile
  // Listing flow views:     camera | listing-form | pricing | publish | success
  const [view, setView] = React.useState("inventory");

  // ── Listing draft (single source of truth for the flow) ─────────────────
  const [draft, setDraft] = React.useState(EMPTY_DRAFT);

  const updateDraft = (updates) =>
    setDraft(prev => ({ ...prev, ...updates }));

  const resetDraft = () => setDraft(EMPTY_DRAFT);

  // ── Flow navigation helpers ──────────────────────────────────────────────
  const startFlow = () => { resetDraft(); setView('camera'); };
  const closeFlow = () => { resetDraft(); setView('inventory'); };

  // ── Which views are part of the listing flow? ────────────────────────────
  const FLOW_VIEWS = new Set(['camera', 'listing-form', 'pricing', 'publish', 'success']);
  const isFlow     = FLOW_VIEWS.has(view);

  // ── App bar config for inventory-side views ──────────────────────────────
  const titles = {
    home:      "Home",
    inventory: "Inventory",
    messages:  "Messages",
    profile:   "Profile",
  };

  const trailing = view === "inventory" ? (
    <IconButton icon="filter" title="Filter" />
  ) : null;

  // ── Render ───────────────────────────────────────────────────────────────
  if (isFlow) {
    let flowContent;
    switch (view) {
      case 'camera':
        flowContent = (
          <CameraScreen
            draft={draft}
            updateDraft={updateDraft}
            onNext={() => setView('listing-form')}
            onClose={closeFlow}
          />
        );
        break;

      // Phases 3–8 screens will be wired in as they are built (Phases 3–8).
      // Placeholder until each phase lands:
      default:
        flowContent = (
          <div style={{
            flex: 1, display: 'flex', flexDirection: 'column',
            alignItems: 'center', justifyContent: 'center', gap: 16,
            background: '#fff', padding: 32,
          }}>
            <div style={{
              font: '500 18px/24px var(--font-sans)',
              color: 'var(--go-neutral-2)', textAlign: 'center',
            }}>
              Screen coming soon
            </div>
            <div style={{
              font: '400 13px/18px var(--font-sans)',
              color: 'var(--go-gray-800)', textAlign: 'center',
            }}>
              View: <code>{view}</code>
            </div>
            <button
              onClick={closeFlow}
              style={{
                marginTop: 8, padding: '10px 20px', borderRadius: 5,
                background: 'var(--go-secondary)', color: '#fff',
                border: 'none', cursor: 'pointer',
                font: '500 14px/20px var(--font-sans)',
              }}
            >
              ← Back to inventory
            </button>
          </div>
        );
    }

    return <FlowShell>{flowContent}</FlowShell>;
  }

  // ── Inventory-side views (wrapped in AppShell) ────────────────────────────
  let content;
  switch (view) {
    case "inventory":
      content = <Inventory onOpen={() => {}} onCreate={startFlow} />; break;
    case "home":
      content = <Placeholder title="Home"     body="Your dashboard will show sales, views and suggested actions here." />; break;
    case "messages":
      content = <Placeholder title="Messages" body="No new messages across your marketplaces." />; break;
    case "profile":
      content = <Placeholder title="Profile"  body="Account, connected marketplaces, and plan settings." />; break;
    default:
      content = null;
  }

  return (
    <AppShell
      view={view}
      setView={setView}
      title={titles[view] || ""}
      trailing={trailing}
      onFabPress={startFlow}
    >
      {content}
    </AppShell>
  );
}

function Placeholder({ title, body }) {
  return (
    <div style={{
      padding: "40px 24px",
      display: "flex", flexDirection: "column", gap: 12,
      alignItems: "flex-start",
    }}>
      <h2 style={{ font: "400 24px/32px var(--font-sans)", color: "var(--sys-on-surface)", margin: 0 }}>{title}</h2>
      <p style={{
        font: "400 14px/20px var(--font-sans)", letterSpacing: "0.25px",
        color: "var(--sys-on-surface-variant)", margin: 0,
      }}>{body}</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

// ── Dialog demo (sidebar) ─────────────────────────────────────────────────────
function DialogDemo() {
  const [open, setOpen] = React.useState(false);
  const [loading, setLoading] = React.useState(false);

  const handlePrimary = () => {
    setLoading(true);
    setTimeout(() => { setLoading(false); setOpen(false); }, 1500);
  };

  return (
    <React.Fragment>
      <Button variant="tonal" onClick={() => setOpen(true)}>
        Show dialog
      </Button>
      <Dialog
        open={open}
        onClose={() => setOpen(false)}
        title="Publish listing?"
        primaryAction={{ label: "Publish", onClick: handlePrimary, loading }}
        secondaryAction={{ label: "Cancel", onClick: () => setOpen(false) }}
      >
        This listing will be crossposted to your connected marketplaces. You can unpublish it at any time from your inventory.
      </Dialog>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("dialog-demo-root")).render(<DialogDemo />);
</script>
</body>
</html>
